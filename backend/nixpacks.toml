[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.start]
# Primero limpiamos, luego ejecutamos tu script de inicialización y al final encendemos
cmd = "php artisan config:clear && php db_init.php && php artisan serve --host=0.0.0.0 --port=$PORT"
