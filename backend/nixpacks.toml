[phases.setup]
nixPkgs = ["php82", "php82Packages.composer"]

[variables]
    PHP_EXTENSION_INSTALL = "pdo_mysql, mbstring, bcmath, xml, ctype, openssl"

[phases.build]
    # Instalamos dependencias pero NO cacheamos configuración aquí
    cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.start]
    # Primero limpiamos cualquier caché viejo para obligar a Laravel a leer Railway
    # Luego corremos todo con --force y --no-interaction
    cmd = "php artisan config:clear && php artisan cache:clear && php artisan migrate --force --no-interaction && php artisan db:seed --force --no-interaction && php artisan serve --host=0.0.0.0 --port=$PORT"
